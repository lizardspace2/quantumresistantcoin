# Cloudflare Tunnel Configuration
# This file defines how incoming traffic from Cloudflare is routed to your Docker containers.

ingress:
  # Master Node (API)
  - hostname: master.quantumresistantcoin.com
    service: http://quantix-master:3001
  
  # Explorer Node (API)
  - hostname: node-explorer.quantumresistantcoin.com
    service: http://quantix-explorer:3001
  
  # Standard Node (API)
  - hostname: standard.quantumresistantcoin.com
    service: http://quantix-standard:3001

  # Master Node (P2P WebSocket)
  - hostname: p2p.quantumresistantcoin.com
    service: http://quantix-master:6001

  # Catch-all
  - service: http_status:404
